services:
  - type: web
    name: aura-ai-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: cd backend && uvicorn app.core.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:////var/data/aura.db
      - key: TRANSFORMERS_OFFLINE
        value: "1"
      - key: HF_HUB_OFFLINE
        value: "1"
    disk:
      name: aura-sqlite-storage
      mountPath: /var/data
      sizeGB: 10

  - type: web
    name: aura-ai-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: aura-ai-backend
          envVarKey: RENDER_EXTERNAL_URL
