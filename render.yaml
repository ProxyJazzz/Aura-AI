services:
  - type: web
    name: aura-ai-backend
    env: python
    pythonVersion: "3.11"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.core.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        value: sqlite:////var/data/aura.db
      - key: HF_HOME
        value: /var/data/hf_cache
    disk:
      name: aura-sqlite-storage
      mountPath: /var/data
      sizeGB: 10

  - type: web
    name: aura-ai-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    healthCheckPath: /
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: aura-ai-backend
          envVarKey: RENDER_EXTERNAL_URL
